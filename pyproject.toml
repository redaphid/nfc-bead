[project]
name = "nfc-bead"
version = "0.1.0"
description = "NFC bead/charm pipeline — Blender 5.0 build, architect-mode aesthetic, multi-color STL/3MF export for Centauri Carbon 2"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    # Core mesh manipulation: STL/OBJ load, manifold checks, bbox, repair.
    # Industry-standard.
    "trimesh>=4.12",
    "numpy>=1.26",
    # Official 3MF Consortium library — produces slicer-loadable 3MF
    # (Bambu Studio / Elegoo Slicer / Prusa Slicer all read this).
    "lib3mf>=2.5",
    # Robust manifold repair / boolean ops. Optional but cheap.
    "manifold3d>=3.4",
    # Pillow for any incidental image work (PNG plate previews in 3MF, etc.)
    "pillow>=10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]

[project.scripts]
nfc-blender-send  = "tools.blender_send:main"
nfc-verify-stls   = "tools.verify_stls:main"
nfc-make-3mf      = "tools.make_3mf:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tools"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]
